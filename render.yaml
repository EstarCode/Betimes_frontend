## render.yaml - Betimes Document Processing System
## Render deployment configuration

services:
  # ── Web Service (Django + Gunicorn) ─────────────────────────────
  - type: web
    name: betimes-backend
    runtime: python
    region: oregon
    plan: free

    buildCommand: "./render-build.sh"
    startCommand: "./render-start.sh"

    healthCheckPath: /api/health/

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: betimes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: betimes-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://betimes-frontend.onrender.com"
      - key: WEB_CONCURRENCY
        value: "2"

  # ── Celery Worker ────────────────────────────────────────────────
  - type: worker
    name: betimes-celery-worker
    runtime: python
    region: oregon
    plan: free

    buildCommand: "pip install -r requirements.txt"
    startCommand: "celery -A config worker --loglevel=info --concurrency=2"

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings
      - key: DATABASE_URL
        fromDatabase:
          name: betimes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: betimes-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

# ── PostgreSQL Database ──────────────────────────────────────────
databases:
  - name: betimes-db
    region: oregon
    plan: free
    databaseName: betimes
    user: betimes_user

# ── Redis ────────────────────────────────────────────────────────
# Note: Add Redis manually in Render dashboard:
# Dashboard > New > Redis > name: betimes-redis > free plan
# Then link REDIS_URL to the betimes-backend and celery worker services.
