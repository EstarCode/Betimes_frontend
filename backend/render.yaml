services:
  - type: web
    name: betimes-backend
    env: python
    buildCommand: pip install -r requirements-render.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: False
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: betimes-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: betimes-redis
          property: connectionString
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app

  - type: redis
    name: betimes-redis
    ipAllowList: []

databases:
  - name: betimes-db
    databaseName: betimes
    user: betimes
